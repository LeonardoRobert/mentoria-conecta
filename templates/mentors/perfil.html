{% extends "base.html" %}
{% block title %}Meu Perfil — MentoriaConecta{% endblock %}
{% block content %}

<div class="form-container" style="max-width:600px;">
  <div class="form-card">
    <div class="form-title">⚙️ Meu Perfil</div>
    <div class="form-subtitle">Mantenha seu perfil atualizado para aparecer nas recomendações.</div>

    <form method="POST">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" name="nome" value="{{ mentor.nome }}" required>
      </div>
      <div class="form-group">
        <label>Telefone</label>
        <input type="text" name="telefone" value="{{ mentor.telefone or '' }}">
      </div>
      <div style="display:grid;grid-template-columns:1fr 80px;gap:12px;">
        <div class="form-group">
          <label>Cidade</label>
          <input type="text" name="cidade" value="{{ mentor.cidade or '' }}">
        </div>
        <div class="form-group">
          <label>UF</label>
          <input type="text" name="estado" value="{{ mentor.estado or '' }}" maxlength="2">
        </div>
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea name="bio">{{ mentor.bio or '' }}</textarea>
      </div>

      <div class="form-group">
        <label>Minhas habilidades</label>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;">
          {% for h in habilidades_all %}
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--branco);border:1px solid var(--cinza-claro);padding:6px 12px;border-radius:20px;font-size:0.85rem;">
            <input type="checkbox" name="habilidades" value="{{ h.id }}"
              {% if h.id in ids_mentor %}checked{% endif %}>
            {{ h.nome }}
          </label>
          {% endfor %}
        </div>
      </div>

      <button type="submit" class="btn-full">Salvar alterações</button>
    </form>

    <div class="form-footer">
      <a href="{{ url_for('mentor.dashboard') }}" style="color:var(--cinza-medio);">← Voltar ao dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
